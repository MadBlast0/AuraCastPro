name: AuraCastPro CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-windows:
    name: Build & Test — Windows x64
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.3"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtcharts
          cache: true

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "C:\vcpkg\vcpkg.exe")) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKG_FEATURE_FLAGS=-versions" >> $env:GITHUB_ENV

      - name: Find dxc.exe
        shell: pwsh
        run: |
          $dxc = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "dxc.exe" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1 -ExpandProperty FullName
          if (!$dxc) { $dxc = "dxc.exe" }
          echo "DXC_PATH=$dxc" >> $env:GITHUB_ENV

      - name: Bonjour stub
        shell: pwsh
        run: |
          New-Item -Force -ItemType Directory "C:\BonjourSDK\include" | Out-Null
          New-Item -Force -ItemType Directory "C:\BonjourSDK\lib\x64" | Out-Null
          $h = '#pragma once' + "`n"
          $h += 'typedef unsigned int DNSServiceFlags;' + "`n"
          $h += 'typedef unsigned int DNSServiceErrorType;' + "`n"
          $h += 'typedef struct _DNSServiceRef_t* DNSServiceRef;' + "`n"
          $h += '#define kDNSServiceErr_NoError 0' + "`n"
          $h += '#define kDNSServiceInterfaceIndexAny 0' + "`n"
          $h += '#define kDNSServiceFlagsShareConnection 0' + "`n"
          $h += 'static inline DNSServiceErrorType DNSServiceBrowse(...){return 1;}' + "`n"
          $h += 'static inline void DNSServiceRefDeallocate(DNSServiceRef){}' + "`n"
          $h += 'static inline DNSServiceErrorType DNSServiceResolve(...){return 1;}' + "`n"
          Set-Content "C:\BonjourSDK\include\dns_sd.h" $h
          Set-Content "C:\BonjourSDK\dnssd.def" "LIBRARY dnssd`nEXPORTS"
          lib /DEF:"C:\BonjourSDK\dnssd.def" /OUT:"C:\BonjourSDK\lib\x64\dnssd.lib" /MACHINE:X64 2>&1
          echo "BONJOUR_SDK_DIR=C:\BonjourSDK" >> $env:GITHUB_ENV

      - name: Generate test fixtures
        shell: pwsh
        continue-on-error: true
        run: python tests/generate_synthetic_fixtures.py

      - name: Configure
        shell: pwsh
        run: |
          $p = if ("${{ matrix.config }}" -eq "Debug") { "windows-debug" } else { "windows-release" }
          cmake --preset $p `
            -DDXC_EXECUTABLE="$env:DXC_PATH" `
            -DBONJOUR_SDK_DIR="$env:BONJOUR_SDK_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        shell: pwsh
        run: |
          $p = if ("${{ matrix.config }}" -eq "Debug") { "build-debug" } else { "build-release" }
          cmake --build --preset $p --parallel

      - name: Test
        if: matrix.config == 'Debug'
        shell: pwsh
        continue-on-error: true
        run: ctest --preset run-all-tests-debug --output-on-failure --timeout 120

      - name: Upload exe
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: AuraCastPro-Windows-x64
          path: |
            build/release_x64/AuraCastPro.exe
            build/release_x64/Shaders/*.cso
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.config }}
          path: build/*/CMakeFiles/*.log
          retention-days: 7
          if-no-files-found: ignore

  cppcheck:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y cppcheck
      - run: cppcheck --enable=warning --suppress=missingIncludeSystem --suppress=unusedFunction --std=c++20 -I src/utils -I src/engine src/utils/ src/engine/ src/integration/ 2>&1 | tee cppcheck.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck.txt
          retention-days: 14
