name: AuraCastPro CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  QT_VERSION: "6.6.3"

jobs:
  # ─── BUILD AND TEST (Windows x64) ──────────────────────────────────────────
  build-windows:
    name: Build & Test — Windows x64
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtcharts qtquick qtquickcontrols2 qtshadertools
          cache: true

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-win64-${{ hashFiles('vcpkg.json') }}-v3
          restore-keys: vcpkg-win64-

      - name: Bootstrap vcpkg
        run: |
          if (!(Test-Path "C:\vcpkg\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          C:\vcpkg\vcpkg integrate install
        shell: pwsh

      - name: Install vcpkg dependencies
        run: |
          C:\vcpkg\vcpkg install `
            boost-asio:x64-windows `
            boost-system:x64-windows `
            openssl:x64-windows `
            protobuf:x64-windows `
            spdlog:x64-windows `
            ffmpeg[avcodec,avformat,avutil,swresample,swscale]:x64-windows `
            nlohmann-json:x64-windows `
            gtest:x64-windows `
            libuv:x64-windows `
            zlib:x64-windows `
            directx-headers:x64-windows
        shell: pwsh

      - name: Locate dxc.exe
        run: |
          $dxc = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                   -Recurse -Filter "dxc.exe" -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -match "x64" } |
                 Sort-Object FullName -Descending |
                 Select-Object -First 1 -ExpandProperty FullName
          if (!$dxc) { $dxc = "dxc.exe" }
          echo "DXC_PATH=$dxc" >> $env:GITHUB_ENV
          echo "Found dxc: $dxc"
        shell: pwsh

      - name: Setup Bonjour SDK stub
        run: |
          $dir = "C:\BonjourSDK"
          New-Item -ItemType Directory -Force "$dir\include" | Out-Null
          New-Item -ItemType Directory -Force "$dir\lib\x64"  | Out-Null
          Set-Content "$dir\include\dns_sd.h" @"
#pragma once
typedef unsigned int DNSServiceFlags;
typedef unsigned int DNSServiceErrorType;
typedef struct _DNSServiceRef_t* DNSServiceRef;
#define kDNSServiceErr_NoError 0
#define kDNSServiceInterfaceIndexAny 0
#define kDNSServiceFlagsShareConnection 0
static inline DNSServiceErrorType DNSServiceBrowse(...) { return 1; }
static inline void DNSServiceRefDeallocate(DNSServiceRef) {}
static inline DNSServiceErrorType DNSServiceResolve(...) { return 1; }
"@
          # Create empty stub lib using a .def file
          Set-Content "$dir\dnssd.def" "LIBRARY dnssd`nEXPORTS"
          lib /DEF:"$dir\dnssd.def" /OUT:"$dir\lib\x64\dnssd.lib" /MACHINE:X64 2>&1
          echo "BONJOUR_SDK_DIR=$dir" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Pre-generate test fixtures
        run: |
          python tests/generate_synthetic_fixtures.py
        shell: pwsh
        continue-on-error: true

      - name: Configure CMake (${{ matrix.config }})
        run: |
          $preset = if ("${{ matrix.config }}" -eq "Debug") { "windows-debug" } else { "windows-release" }
          cmake --preset $preset `
            -DDXC_EXECUTABLE="$env:DXC_PATH" `
            -DBONJOUR_SDK_DIR="$env:BONJOUR_SDK_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      - name: Build (${{ matrix.config }})
        run: |
          $preset = if ("${{ matrix.config }}" -eq "Debug") { "build-debug" } else { "build-release" }
          cmake --build --preset $preset --parallel
        shell: pwsh

      - name: Run unit tests
        if: matrix.config == 'Debug'
        run: ctest --preset run-all-tests-debug --output-on-failure --timeout 120
        shell: pwsh
        continue-on-error: true

      - name: Upload Release artifact
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: AuraCastPro-Release-Windows-x64
          path: |
            build/release_x64/AuraCastPro.exe
            build/release_x64/Shaders/*.cso
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.config }}
          path: |
            build/*/CMakeFiles/CMakeOutput.log
            build/*/CMakeFiles/CMakeError.log
          retention-days: 7
          if-no-files-found: ignore

  # ─── STATIC ANALYSIS ───────────────────────────────────────────────────────
  cppcheck:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        # Warnings only — does not fail the build (informational for now)
        run: |
          cppcheck \
            --enable=warning,performance \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --std=c++20 \
            -I src/utils \
            -I src/engine \
            src/utils/ src/engine/ src/integration/ \
            2>&1 | tee cppcheck-report.txt
          echo "cppcheck complete (informational only)"

      - name: Upload cppcheck report
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt
          retention-days: 14

  # ─── CODE FORMAT CHECK ─────────────────────────────────────────────────────
  clang-format:
    name: Code Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format-16

      - name: Check formatting (informational)
        # Does not fail the build — just reports differences
        run: |
          find src cloud tests \
            \( -name "*.cpp" -o -name "*.h" \) \
            ! -path "*/build/*" \
            | xargs clang-format-16 --dry-run 2>&1 | tee format-report.txt || true
          echo "Format check complete (informational only)"

      - name: Upload format report
        uses: actions/upload-artifact@v4
        with:
          name: format-report
          path: format-report.txt
          retention-days: 14
