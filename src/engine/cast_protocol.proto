syntax = "proto2";

package extensions.api.cast_channel;

option optimize_for = LITE_RUNTIME;

// ─── Auth messages ────────────────────────────────────────────────────────────

message AuthChallenge {
    // Optional nonce for challenge-response
    optional bytes sender_nonce = 1;
    optional HashAlgorithm hash_algorithm = 2 [default = SHA1];
    optional SignatureAlgorithm signature_algorithm = 3 [default = RSASSA_PKCS1v15];
}

message AuthResponse {
    required bytes signature          = 1;
    required bytes client_auth_certificate = 2;
    repeated bytes intermediate_certificate = 3;
    optional SignedData signed_data    = 4;
    optional bytes sender_nonce        = 5;
}

message AuthError {
    enum ErrorType {
        INTERNAL_ERROR           = 0;
        NO_TLS                   = 1;
        SIGNATURE_ALGORITHM_UNAVAILABLE = 2;
    }
    required ErrorType error_type = 1;
}

message DeviceAuthMessage {
    optional AuthChallenge challenge = 1;
    optional AuthResponse  response  = 2;
    optional AuthError     error     = 3;
}

// ─── Core Cast message wrapper ────────────────────────────────────────────────

message CastMessage {
    enum ProtocolVersion {
        CASTV2_1_0 = 0;
    }
    required ProtocolVersion protocol_version = 1;

    // Identifies the sender application
    required string source_id      = 2;
    required string destination_id = 3;

    // Namespace of the message (e.g. "urn:x-cast:com.google.cast.tp.heartbeat")
    required string namespace = 4;

    enum PayloadType {
        STRING = 0;
        BINARY = 1;
    }
    required PayloadType payload_type = 5;

    // Set if payload_type == STRING
    optional string payload_utf8   = 6;
    // Set if payload_type == BINARY
    optional bytes  payload_binary = 7;
}

// ─── Launch / Stop ────────────────────────────────────────────────────────────

message LaunchRequest {
    required string request_id = 1;
    required string app_id     = 2;
    optional string language   = 3;
}

message StopRequest {
    required string request_id = 1;
    required string session_id = 2;
}

// ─── Media status ─────────────────────────────────────────────────────────────

message MediaStatusResponse {
    optional string  request_id      = 1;
    optional string  media_session_id = 2;
    optional double  current_time    = 3;
    optional string  player_state    = 4;  // PLAYING, PAUSED, BUFFERING, IDLE
    optional double  duration        = 5;
    optional int32   volume_level    = 6;
    optional bool    volume_muted    = 7;
}

// ─── Enums ────────────────────────────────────────────────────────────────────

enum HashAlgorithm {
    SHA1   = 0;
    SHA256 = 1;
}

enum SignatureAlgorithm {
    RSASSA_PKCS1v15 = 0;
    RSASSA_PSS      = 1;
}

message SignedData {
    required bytes digest    = 1;
    optional bytes signature = 2;
}
